<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <link rel="stylesheet" href="static/pico.min.css" />
  <link rel="stylesheet" href="static/style.css" />
  <title>TotTally</title>
</head>

<body class="container">
  <hgroup>
    <h1 class="title">Tot-Tally</h1>
    <h2 class="subtitle">👶📝</h2>
  </hgroup>

  <main>
    <article>
      <ul>
        <li>Tally your tot's ins and outs!</li>
        <li>No login/password required!</li>
        <li>Bookmark the generated URL!</li>
        <li>
          <a href="https://github.com/ryyan/tot-tally">
            See here for a demo video!
          </a>
        </li>
      </ul>
    </article>

    <article>
      <header>
        Start a New Tally
      </header>

      <form method="POST">
        <fieldset>
          <label for="name">Baby Name</label>
          <input id="name" name="name" placeholder="Baby Name" maxlength="20" />

          <label for="name">Timezone</label>
          <select id="timezone" name="timezone" aria-label="Select your timezone" required>
            <option value="Pacific/Honolulu">
              Pacific/Honolulu GMT-10:00
            </option>
            <option value="America/Anchorage">
              America/Anchorage GMT-9:00
            </option>
            <option value="America/Los_Angeles">
              America/Los_Angeles GMT-8:00
            </option>
            <option value="America/Boise">America/Boise GMT-7:00</option>
            <option value="America/Denver">
              America/Denver GMT-7:00
            </option>
            <option value="America/Phoenix">
              America/Phoenix GMT-7:00
            </option>
            <option value="America/Chicago" selected>
              America/Chicago GMT-6:00
            </option>
            <option value="America/Detroit">
              America/Detroit GMT-5:00
            </option>
            <option value="America/New_York">
              America/New_York GMT-5:00
            </option>
          </select>
        </fieldset>

        <button type="submit" class="button is-primary">Let's Go!</button>
      </form>
    </article>
  </main>

  <br /><br />
</body>

</html>
